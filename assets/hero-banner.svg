<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Cozy cyber coding bear hero banner</title>
  <desc id="desc">A dark blue server room banner with a cute brown bear coding at a glowing terminal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="52%" stop-color="#0d2136"/>
      <stop offset="100%" stop-color="#071827"/>
    </linearGradient>
    <radialGradient id="glow" cx="52%" cy="62%" r="48%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity=".36"/>
      <stop offset="55%" stop-color="#58a6ff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .panel{fill:#0d1b2d;stroke:#244969;stroke-width:2}
      .line{stroke:#2e5e85;stroke-width:2;opacity:.55}
      .tiny{fill:#79c0ff;opacity:.8}
      .amber{fill:#f2cc60}
      .green{fill:#9be9a8}
      .screen{fill:#061320;stroke:#58a6ff;stroke-width:2}
      .text{font-family:Consolas,Monaco,monospace;fill:#e6edf3}
      .muted{fill:#8b949e}
    </style>
  </defs>

  <rect width="1200" height="320" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="22" fill="url(#glow)"/>

  <g opacity=".9">
    <rect class="panel" x="30" y="34" width="170" height="248" rx="14"/>
    <rect class="panel" x="220" y="34" width="160" height="248" rx="14"/>
    <rect class="panel" x="860" y="34" width="170" height="248" rx="14"/>
    <rect class="panel" x="1050" y="34" width="120" height="248" rx="14"/>
    <path class="line" d="M58 78h112M58 118h112M58 158h112M58 198h112M244 82h92M244 122h92M244 162h92M888 80h104M888 122h104M888 164h104M1078 84h66M1078 130h66M1078 176h66"/>
    <circle class="tiny" cx="75" cy="79" r="4"/><circle class="green" cx="92" cy="119" r="4"/><circle class="amber" cx="75" cy="159" r="4"/>
    <circle class="tiny" cx="904" cy="81" r="4"/><circle class="green" cx="922" cy="123" r="4"/><circle class="amber" cx="904" cy="165" r="4"/>
  </g>

  <g transform="translate(430 48)">
    <rect x="0" y="0" width="392" height="208" rx="18" fill="#081827" stroke="#2f6c9c" stroke-width="2"/>
    <rect x="24" y="28" width="344" height="138" rx="10" class="screen" filter="url(#softGlow)"/>
    <text class="text" x="48" y="66" font-size="16">$ npm run build-cozy</text>
    <text class="text muted" x="48" y="96" font-size="14">&gt; compiling ideas...</text>
    <rect x="48" y="118" width="76" height="8" rx="4" fill="#58a6ff"/>
    <rect x="136" y="118" width="126" height="8" rx="4" fill="#244969"/>
    <rect x="48" y="140" width="224" height="8" rx="4" fill="#9be9a8"/>
    <rect x="288" y="140" width="34" height="8" rx="4" fill="#f2cc60"/>
    <rect x="95" y="184" width="202" height="16" rx="8" fill="#0d1117" stroke="#244969"/>
  </g>

  <g transform="translate(770 74)">
    <ellipse cx="96" cy="188" rx="118" ry="28" fill="#020712" opacity=".45"/>
    <circle cx="92" cy="88" r="62" fill="#a76636"/>
    <circle cx="46" cy="38" r="24" fill="#a76636"/>
    <circle cx="46" cy="38" r="13" fill="#6f3c22"/>
    <circle cx="144" cy="38" r="24" fill="#a76636"/>
    <circle cx="144" cy="38" r="13" fill="#6f3c22"/>
    <circle cx="72" cy="84" r="7" fill="#101820"/>
    <circle cx="120" cy="84" r="7" fill="#101820"/>
    <ellipse cx="96" cy="112" rx="33" ry="24" fill="#e2c5a3"/>
    <circle cx="96" cy="106" r="7" fill="#201510"/>
    <path d="M82 120q14 15 32 0" fill="none" stroke="#201510" stroke-width="4" stroke-linecap="round"/>
    <path d="M30 128q26-36 72-26q54 12 78 62v58H34z" fill="#102d4a" stroke="#2f6c9c" stroke-width="3"/>
    <rect x="132" y="118" width="50" height="54" rx="10" fill="#f1dfc4" stroke="#6f3c22" stroke-width="3"/>
    <rect x="139" y="113" width="36" height="11" rx="6" fill="none" stroke="#f1dfc4" stroke-width="5"/>
    <path d="M143 148h26" stroke="#6f3c22" stroke-width="3"/>
  </g>

  <g transform="translate(96 88)">
    <text class="text" x="0" y="0" font-size="44" font-weight="700">Welcome to my</text>
    <text class="text" x="0" y="54" font-size="44" font-weight="700">cozy code space</text>
    <text class="text muted" x="0" y="96" font-size="20">Server-room calm. Pixel-heart craft.</text>
    <text class="text" x="0" y="146" font-size="22">&gt; build, break, learn, repeat_</text>
  </g>

  <g opacity=".8">
    <path d="M104 258h80M202 258h18M245 258h70" stroke="#58a6ff" stroke-width="2"/>
    <path d="M1050 258h78M1140 258h18" stroke="#9be9a8" stroke-width="2"/>
    <circle cx="1010" cy="84" r="3" class="amber"/>
    <circle cx="1030" cy="104" r="3" class="tiny"/>
    <circle cx="1000" cy="130" r="2" class="green"/>
  </g>
</svg>
