  <rect width="1200" height="120" rx="18" fill="#07111f"/>
  <rect x="10" y="10" width="1180" height="100" rx="16" fill="#0d1b2d" stroke="#244969" stroke-width="2" stroke-dasharray="6 6"/>
  <g transform="translate(42 29)">
