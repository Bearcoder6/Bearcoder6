<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 170" role="img" aria-labelledby="title desc">
  <title id="title">Retro arcade learning activity board</title>
  <desc id="desc">A contribution graph inspired arcade board showing learning quests and colorful pixel cells.</desc>
  <defs>
    <style>
      .panel{fill:#0d1117;stroke:#30363d;stroke-width:2}
      .txt{font-family:Consolas,Monaco,monospace;fill:#c9d1d9}
      .muted{fill:#8b949e}
      .cell{fill:#161b22}
      .g1{fill:#0e4429}.g2{fill:#006d32}.g3{fill:#26a641}.g4{fill:#39d353}
      .b{fill:#58a6ff}.y{fill:#ffcc66}.p{fill:#ff7bba}
      .twinkle{animation:twinkle 2.4s steps(1,end) infinite}
      .twinkle2{animation:twinkle 2.4s steps(1,end) .8s infinite}
      .scan{animation:scan 4s linear infinite}
      @keyframes twinkle{0%,100%{opacity:.35}50%{opacity:1}}
      @keyframes scan{0%{transform:translateX(-40px)}100%{transform:translateX(700px)}}
    </style>
  </defs>
  <rect x="8" y="8" width="744" height="154" rx="10" class="panel"/>
