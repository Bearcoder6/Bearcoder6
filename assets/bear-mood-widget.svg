<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 430" role="img" aria-labelledby="title desc">
  <title id="title">Pixel bear mood widget</title>
  <desc id="desc">Five cute bear mood rows: happy, focused, sleepy, excited, and love it.</desc>
  <defs>
    <style>
      .bg{fill:#07111f}
      .box{fill:#0d1b2d;stroke:#244969;stroke-width:2}
      .row{fill:#0b1626;stroke:#1f3f5e;stroke-width:1}
      .label{font-family:Consolas,Monaco,monospace;font-size:22px;font-weight:700;fill:#e6edf3}
      .copy{font-family:Consolas,Monaco,monospace;font-size:16px;fill:#a9b6c7}
      .accent{fill:#58a6ff}
      .spark{fill:#f2cc60}
      .bear{fill:#a76636}
      .dark{fill:#201510}
      .muzzle{fill:#e2c5a3}
      .pink{fill:#ff7aa2}
    </style>
  </defs>
  <rect class="bg" width="680" height="430" rx="18"/>
  <rect class="box" x="10" y="10" width="660" height="410" rx="18"/>
  <text class="label" x="32" y="44">Bear Mood Widget</text>

  <g transform="translate(24 66)">
    <rect class="row" x="0" y="0" width="632" height="62" rx="12"/>
    <g transform="translate(22 9)">
      <rect class="bear" x="8" y="8" width="40" height="34" rx="8"/><rect class="bear" x="0" y="2" width="16" height="16" rx="4"/><rect class="bear" x="40" y="2" width="16" height="16" rx="4"/>
      <rect class="muzzle" x="19" y="24" width="20" height="14" rx="5"/><rect class="dark" x="17" y="20" width="5" height="5"/><rect class="dark" x="36" y="20" width="5" height="5"/><rect class="dark" x="27" y="27" width="5" height="5"/>
      <rect class="spark" x="62" y="4" width="6" height="6"/><rect class="spark" x="74" y="18" width="6" height="6"/>
    </g>
    <text class="label" x="128" y="25">Happy</text>
    <text class="copy" x="128" y="48">All systems go. Tiny wins count.</text>
  </g>

  <g transform="translate(24 138)">
    <rect class="row" x="0" y="0" width="632" height="62" rx="12"/>
    <g transform="translate(22 9)">
      <rect class="bear" x="8" y="8" width="40" height="34" rx="8"/><rect class="bear" x="0" y="2" width="16" height="16" rx="4"/><rect class="bear" x="40" y="2" width="16" height="16" rx="4"/>
      <rect class="muzzle" x="19" y="24" width="20" height="14" rx="5"/><rect class="dark" x="16" y="20" width="12" height="4"/><rect class="dark" x="32" y="20" width="12" height="4"/><rect class="dark" x="27" y="29" width="5" height="5"/>
      <rect x="60" y="24" width="42" height="24" rx="4" fill="#0d1117" stroke="#58a6ff"/><rect x="67" y="31" width="16" height="3" fill="#9be9a8"/><rect x="67" y="39" width="25" height="3" fill="#58a6ff"/>
    </g>
    <text class="label" x="128" y="25">Focused</text>
    <text class="copy" x="128" y="48">Deep in the code, soft keyboard glow.</text>
  </g>

  <g transform="translate(24 210)">
    <rect class="row" x="0" y="0" width="632" height="62" rx="12"/>
    <g transform="translate(22 9)">
      <rect class="bear" x="8" y="18" width="48" height="24" rx="10"/><rect class="bear" x="0" y="12" width="16" height="16" rx="4"/><rect class="bear" x="44" y="12" width="16" height="16" rx="4"/>
      <rect class="muzzle" x="22" y="28" width="20" height="10" rx="4"/><rect class="dark" x="17" y="25" width="12" height="3"/><rect class="dark" x="37" y="25" width="12" height="3"/>
      <text x="70" y="17" font-family="Consolas,Monaco,monospace" font-size="16" fill="#58a6ff">Zzz</text>
    </g>
    <text class="label" x="128" y="25">Sleepy</text>
    <text class="copy" x="128" y="48">Recharge mode. Good rest, better code.</text>
  </g>

  <g transform="translate(24 282)">
    <rect class="row" x="0" y="0" width="632" height="62" rx="12"/>
    <g transform="translate(22 9)">
      <rect class="bear" x="8" y="8" width="40" height="34" rx="8"/><rect class="bear" x="0" y="2" width="16" height="16" rx="4"/><rect class="bear" x="40" y="2" width="16" height="16" rx="4"/>
      <rect class="muzzle" x="19" y="24" width="20" height="14" rx="5"/><rect class="dark" x="16" y="18" width="7" height="7"/><rect class="dark" x="37" y="18" width="7" height="7"/><rect class="dark" x="26" y="30" width="9" height="5"/>
      <path d="M72 9l7 13 14 2-10 10 3 14-14-7-13 7 3-14-10-10 14-2z" fill="#f2cc60"/>
    </g>
    <text class="label" x="128" y="25">Excited</text>
    <text class="copy" x="128" y="48">New idea unlocked. Time to prototype.</text>
  </g>

  <g transform="translate(24 354)">
    <rect class="row" x="0" y="0" width="632" height="62" rx="12"/>
    <g transform="translate(22 9)">
      <rect class="bear" x="8" y="8" width="40" height="34" rx="8"/><rect class="bear" x="0" y="2" width="16" height="16" rx="4"/><rect class="bear" x="40" y="2" width="16" height="16" rx="4"/>
      <rect class="muzzle" x="19" y="24" width="20" height="14" rx="5"/><path d="M15 18c0-7 10-7 10 0 0-7 10-7 10 0 0 8-10 12-10 12S15 26 15 18z" class="pink"/><path d="M32 18c0-7 10-7 10 0 0-7 10-7 10 0 0 8-10 12-10 12s-10-4-10-12z" class="pink"/><rect class="dark" x="27" y="30" width="5" height="5"/>
      <rect class="spark" x="68" y="10" width="6" height="6"/><rect class="pink" x="84" y="30" width="7" height="7"/>
    </g>
    <text class="label" x="128" y="25">Love It</text>
    <text class="copy" x="128" y="48">This build has a little extra heart.</text>
  </g>
</svg>
