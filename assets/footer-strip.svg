<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" role="img" aria-labelledby="title desc">
  <title id="title">Cozy bear footer strip</title>
  <desc id="desc">A dark blue footer strip with a bear icon and a quote about simple useful software.</desc>
  <defs>
    <style>
      .text{font-family:Consolas,Monaco,monospace;fill:#e6edf3}
      .muted{fill:#8b949e}
    </style>
