<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-labelledby="title desc">
  <title id="title">Cozy terminal timeline and research radar</title>
  <desc id="desc">A polished dynamic panel with a cozy terminal learning timeline on the left and a glowing research radar on the right.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1a"/>
      <stop offset=".48" stop-color="#101827"/>
      <stop offset="1" stop-color="#061b2d"/>
    </linearGradient>
    <radialGradient id="ambient" cx="36%" cy="18%" r="72%">
      <stop offset="0" stop-color="#58a6ff" stop-opacity=".24"/>
      <stop offset=".46" stop-color="#58a6ff" stop-opacity=".07"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111c2e" stop-opacity=".94"/>
      <stop offset=".52" stop-color="#08111f" stop-opacity=".92"/>
      <stop offset="1" stop-color="#050a13" stop-opacity=".94"/>
    </linearGradient>
    <linearGradient id="rowGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#152b45"/>
      <stop offset=".55" stop-color="#0c1b2d"/>
      <stop offset="1" stop-color="#08111f"/>
    </linearGradient>
    <linearGradient id="cyanStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9cdcfe"/>
      <stop offset=".46" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#39d353"/>
    </linearGradient>
    <radialGradient id="nodeGreen" cx=".35" cy=".3" r=".8">
      <stop offset="0" stop-color="#d1ffd8"/>
      <stop offset=".4" stop-color="#39d353"/>
      <stop offset="1" stop-color="#0e4429"/>
    </radialGradient>
    <radialGradient id="nodeBlue" cx=".35" cy=".3" r=".8">
      <stop offset="0" stop-color="#d7ecff"/>
      <stop offset=".42" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </radialGradient>
    <radialGradient id="nodeGold" cx=".35" cy=".3" r=".8">
      <stop offset="0" stop-color="#fff4bc"/>
      <stop offset=".42" stop-color="#ffcc66"/>
      <stop offset="1" stop-color="#a15c00"/>
    </radialGradient>
    <linearGradient id="scanFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff" stop-opacity=".42"/>
      <stop offset=".64" stop-color="#58a6ff" stop-opacity=".13"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity=".48"/>
    </filter>
    <filter id="blueGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .txt{font-family:Consolas,Monaco,monospace;fill:#dbe7f3}
      .muted{fill:#8b949e}
      .fine{stroke:#58a6ff;stroke-width:1;opacity:.12}
      .ring{fill:none;stroke:url(#cyanStroke);stroke-width:1.4;opacity:.42}
      .axis{stroke:#58a6ff;stroke-width:1;opacity:.18}
      .cursor{animation:cursor 1s steps(1,end) infinite}
      .spark{animation:spark 1.8s ease-in-out infinite}
      .rowA{animation:rowPulse 6s ease-in-out infinite}
      .rowB{animation:rowPulse 6s ease-in-out 1.5s infinite}
      .rowC{animation:rowPulse 6s ease-in-out 3s infinite}
      .rowD{animation:rowPulse 6s ease-in-out 4.5s infinite}
      @keyframes cursor{0%,48%{opacity:1}49%,100%{opacity:0}}
      @keyframes spark{0%,100%{opacity:.35}50%{opacity:1}}
      @keyframes rowPulse{0%,100%{opacity:.64}18%,32%{opacity:1}}
    </style>
  </defs>

  <rect x="8" y="8" width="744" height="244" rx="22" fill="url(#pageBg)" stroke="#30363d" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="8" y="8" width="744" height="244" rx="22" fill="url(#ambient)"/>
  <path class="fine" d="M38 52h684M38 94h684M38 136h684M38 178h684M38 220h684M78 28v224M136 28v224M194 28v224M252 28v224M310 28v224M368 28v224M426 28v224M484 28v224M542 28v224M600 28v224M658 28v224M716 28v224"/>

  <rect x="30" y="32" width="430" height="196" rx="18" fill="url(#glass)" stroke="#30363d" stroke-width="2"/>
  <path d="M48 62h392" stroke="#58a6ff" stroke-width="1" opacity=".22"/>
  <circle cx="55" cy="51" r="4" fill="#ff7b72" opacity=".9"/>
  <circle cx="69" cy="51" r="4" fill="#ffcc66" opacity=".9"/>
  <circle cx="83" cy="51" r="4" fill="#39d353" opacity=".9"/>
  <text class="txt" x="50" y="80" font-size="17">COZY TERMINAL TIMELINE</text>
  <text class="txt muted" x="50" y="101" font-size="13">bear@server-room ~/research</text>

  <g transform="translate(50 116)">
    <g class="rowA">
      <rect x="0" y="0" width="386" height="25" rx="8" fill="url(#rowGlow)" stroke="#1f6feb" stroke-width="1" opacity=".8"/>
      <text class="txt" x="18" y="17" font-size="14">&gt; load paper_notes.md</text>
      <rect x="284" y="8" width="56" height="7" rx="4" fill="#39d353" filter="url(#blueGlow)"/>
      <rect x="348" y="8" width="22" height="7" rx="4" fill="#15243a"/>
    </g>
    <g class="rowB" transform="translate(0 28)">
      <rect x="0" y="0" width="386" height="25" rx="8" fill="#08111f" stroke="#30363d" stroke-width="1"/>
      <text class="txt" x="18" y="17" font-size="14">&gt; prototype agent workflow</text>
      <rect x="284" y="8" width="88" height="7" rx="4" fill="#58a6ff" filter="url(#blueGlow)"/>
    </g>
    <g class="rowC" transform="translate(0 56)">
      <rect x="0" y="0" width="386" height="25" rx="8" fill="#08111f" stroke="#30363d" stroke-width="1"/>
      <text class="txt" x="18" y="17" font-size="14">&gt; test multimodal ideas</text>
      <rect x="284" y="8" width="70" height="7" rx="4" fill="#ffcc66" filter="url(#blueGlow)"/>
    </g>
    <g class="rowD" transform="translate(0 84)">
      <rect x="0" y="0" width="386" height="25" rx="8" fill="#08111f" stroke="#30363d" stroke-width="1"/>
      <text class="txt" x="18" y="17" font-size="14">&gt; commit learning<tspan class="cursor">_</tspan></text>
      <rect x="284" y="8" width="46" height="7" rx="4" fill="#39d353" opacity=".6"/>
    </g>
  </g>

  <rect x="486" y="32" width="222" height="196" rx="18" fill="url(#glass)" stroke="#30363d" stroke-width="2"/>
  <text class="txt" x="510" y="62" font-size="17">RESEARCH RADAR</text>
  <text class="txt muted" x="510" y="82" font-size="12">AI signal monitor</text>

  <ellipse cx="596" cy="211" rx="68" ry="12" fill="#000000" opacity=".28"/>
  <g transform="translate(596 149)">
    <circle r="64" fill="#06101e" stroke="#132a44" stroke-width="2"/>
    <circle r="52" class="ring"/>
    <circle r="37" class="ring"/>
    <circle r="23" class="ring"/>
    <path class="axis" d="M-64 0h128M0-64v128M-45-45l90 90M45-45l-90 90"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4.5s" repeatCount="indefinite"/>
      <path d="M0 0L0-62A62 62 0 0 1 42-45Z" fill="url(#scanFill)"/>
      <line x1="0" y1="0" x2="0" y2="-64" stroke="#9cdcfe" stroke-width="2" stroke-linecap="round" opacity=".86" filter="url(#blueGlow)"/>
    </g>
    <path d="M-44 24C-18-28 20-48 50-24" fill="none" stroke="#58a6ff" stroke-width="2" opacity=".42"/>
    <path d="M-34-36C-4 20 30 44 54 22" fill="none" stroke="#39d353" stroke-width="2" opacity=".28"/>
    <circle cx="-34" cy="-26" r="6" fill="url(#nodeGreen)" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values=".55;1;.55" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="-16" r="6" fill="url(#nodeBlue)" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values=".45;1;.45" dur="2.4s" begin=".4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28" cy="38" r="6" fill="url(#nodeGold)" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values=".5;1;.5" dur="2.4s" begin=".8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-47" cy="18" r="6" fill="#ff7bba" filter="url(#nodeGlow)">
      <animate attributeName="opacity" values=".5;1;.5" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="5" fill="#f97316" filter="url(#nodeGlow)"/>
  </g>

  <g class="txt muted" font-size="11">
    <text x="500" y="139">Agents</text>
    <text x="642" y="128">MLLMs</text>
    <text x="640" y="190">ML</text>
    <text x="507" y="193">C++</text>
    <text x="574" y="119">Python</text>
  </g>

  <rect class="spark" x="722" y="50" width="7" height="7" rx="2" fill="#39d353"/>
  <rect class="spark" x="704" y="211" width="7" height="7" rx="2" fill="#ffcc66"/>
</svg>
